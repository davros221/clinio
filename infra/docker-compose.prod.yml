services:
  postgres:
    image: postgres:16
    container_name: clinio_db
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        APP_VERSION: ${APP_VERSION:-unknown}
    container_name: clinio_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "8000:8000"
    networks:
      - clinio

  nginx:
    build:
      context: ..
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_URL: ""
    container_name: clinio_nginx
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - clinio

volumes:
  postgres_data:

networks:
  clinio:
    driver: bridge
