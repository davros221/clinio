name: Claude Changelog

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]
    paths:
      - "apps/server/**"

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Changelog Update
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            This PR contains backend changes. Update the changelog and bump the version
            for the server app following the instructions in apps/server/CLAUDE.md.
